packages:
  # include all
  - "**"
  # exclude generated dist artifacts that can confuse workspace discovery
  - "!**/dist/**"
  # but exclude cdn/dist since it is generated by npm as part of a
  # weird build system, and it totally messes up stuff.
  - "!**/cdn/dist/**"
  # exclude generated build artifacts that can confuse workspace discovery
  - "!**/build/**"

allowBuilds:
  '@cocalc/gcloud-pricing-calculator': true
  '@cocalc/primus-multiplex': true
  '@cocalc/widgets': true
  bufferutil: true
  electron: true
  es5-ext: true
  esbuild: true
  fs-ext: false
  node-pty: true
  protobufjs: true
  storage-engine: true
  unrs-resolver: true
  utf-8-validate: true
  zeromq: true

patchedDependencies:
  "@rc-component/portal@2.2.0": patches/@rc-component__portal@2.2.0.patch
  fs-ext@2.1.1: patches/fs-ext@2.1.1.patch

minimumReleaseAge: 4320
minimumReleaseAgeExclude:
  - "@cocalc/xterm"
  - patchflow
  - "@nebius/js-sdk"
  # First patched version for GHSA-xcj9-5m2h-648r, GHSA-87f9-hvmw-gh4p,
  # and GHSA-ghcm-xqfw-q4vr in the active Mermaid 11.x line.
  - mermaid
  - "@mermaid-js/parser"

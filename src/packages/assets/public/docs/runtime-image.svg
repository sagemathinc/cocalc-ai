<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 960 540"
  role="img"
  aria-labelledby="title desc"
>
  <title id="title">Runtime image layers for a project</title>
  <desc id="desc">
    A project runtime image composed of reusable Linux software layers.
  </desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f4fbff" />
      <stop offset="1" stop-color="#fff8ec" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow
        dx="0"
        dy="12"
        stdDeviation="16"
        flood-color="#233142"
        flood-opacity="0.16"
      />
    </filter>
  </defs>
  <rect width="960" height="540" fill="url(#bg)" />
  <rect
    x="104"
    y="76"
    width="752"
    height="388"
    rx="30"
    fill="#ffffff"
    filter="url(#shadow)"
  />
  <text
    x="154"
    y="140"
    fill="#22313f"
    font-family="Inter, Arial, sans-serif"
    font-size="32"
    font-weight="800"
  >
    Runtime Image
  </text>
  <text
    x="154"
    y="176"
    fill="#5f6f7a"
    font-family="Inter, Arial, sans-serif"
    font-size="19"
  >
    the software stack every process sees
  </text>
  <g transform="translate(164 225)">
    <rect x="0" y="148" width="420" height="52" rx="12" fill="#23424a" />
    <rect x="38" y="96" width="420" height="52" rx="12" fill="#47746f" />
    <rect x="76" y="44" width="420" height="52" rx="12" fill="#70a288" />
    <rect x="114" y="-8" width="420" height="52" rx="12" fill="#f3c969" />
    <text
      x="24"
      y="181"
      fill="#ffffff"
      font-family="Inter, Arial, sans-serif"
      font-size="20"
      font-weight="700"
    >
      Ubuntu base
    </text>
    <text
      x="62"
      y="129"
      fill="#ffffff"
      font-family="Inter, Arial, sans-serif"
      font-size="20"
      font-weight="700"
    >
      System packages
    </text>
    <text
      x="100"
      y="77"
      fill="#ffffff"
      font-family="Inter, Arial, sans-serif"
      font-size="20"
      font-weight="700"
    >
      Python, R, Jupyter
    </text>
    <text
      x="138"
      y="25"
      fill="#513f08"
      font-family="Inter, Arial, sans-serif"
      font-size="20"
      font-weight="800"
    >
      Project RootFS
    </text>
  </g>
  <g transform="translate(660 186)">
    <rect
      x="0"
      y="0"
      width="128"
      height="168"
      rx="16"
      fill="#f7fbff"
      stroke="#bfd1df"
      stroke-width="2"
    />
    <rect x="28" y="28" width="72" height="72" rx="12" fill="#dbeafe" />
    <path
      d="M42 64h44M64 42v44"
      stroke="#1d4ed8"
      stroke-width="10"
      stroke-linecap="round"
    />
    <rect x="26" y="122" width="76" height="12" rx="6" fill="#c9d7e3" />
    <rect x="38" y="144" width="52" height="12" rx="6" fill="#c9d7e3" />
  </g>
  <path
    d="M590 286h52"
    stroke="#6b9080"
    stroke-width="8"
    stroke-linecap="round"
  />
  <path
    d="M624 260l28 26-28 26"
    fill="none"
    stroke="#6b9080"
    stroke-width="8"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
</svg>

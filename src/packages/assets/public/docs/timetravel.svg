<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 960 540"
  role="img"
  aria-labelledby="title desc"
>
  <title id="title">TimeTravel file history timeline</title>
  <desc id="desc">
    A file history timeline with snapshots, Git revisions, and restore points.
  </desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f7fbff" />
      <stop offset="1" stop-color="#f5fff8" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow
        dx="0"
        dy="12"
        stdDeviation="16"
        flood-color="#233142"
        flood-opacity="0.18"
      />
    </filter>
  </defs>
  <rect width="960" height="540" fill="url(#bg)" />
  <rect
    x="110"
    y="76"
    width="740"
    height="388"
    rx="30"
    fill="#ffffff"
    filter="url(#shadow)"
  />
  <text
    x="156"
    y="140"
    fill="#22313f"
    font-family="Inter, Arial, sans-serif"
    font-size="34"
    font-weight="800"
  >
    TimeTravel
  </text>
  <text
    x="156"
    y="176"
    fill="#5f6f7a"
    font-family="Inter, Arial, sans-serif"
    font-size="19"
  >
    browse file history, Git revisions, snapshots, and backups
  </text>
  <line
    x1="178"
    y1="296"
    x2="760"
    y2="296"
    stroke="#c9d7e3"
    stroke-width="12"
    stroke-linecap="round"
  />
  <line
    x1="178"
    y1="296"
    x2="520"
    y2="296"
    stroke="#4f6f7a"
    stroke-width="12"
    stroke-linecap="round"
  />
  <g fill="#ffffff" stroke-width="8">
    <circle cx="198" cy="296" r="25" stroke="#4f6f7a" />
    <circle cx="330" cy="296" r="25" stroke="#4f6f7a" />
    <circle cx="480" cy="296" r="25" stroke="#4f6f7a" />
    <circle cx="620" cy="296" r="25" stroke="#c9d7e3" />
    <circle cx="744" cy="296" r="25" stroke="#c9d7e3" />
  </g>
  <rect x="310" y="216" width="210" height="54" rx="14" fill="#dbeafe" />
  <text
    x="338"
    y="250"
    fill="#1d4ed8"
    font-family="Inter, Arial, sans-serif"
    font-size="20"
    font-weight="800"
  >
    Git revision
  </text>
  <rect x="534" y="342" width="170" height="54" rx="14" fill="#e7f5ec" />
  <text
    x="565"
    y="376"
    fill="#2d6a4f"
    font-family="Inter, Arial, sans-serif"
    font-size="20"
    font-weight="800"
  >
    Snapshot
  </text>
  <rect x="164" y="342" width="166" height="54" rx="14" fill="#fff3bf" />
  <text
    x="196"
    y="376"
    fill="#8a5a00"
    font-family="Inter, Arial, sans-serif"
    font-size="20"
    font-weight="800"
  >
    Recover
  </text>
  <path
    d="M656 206c24 22 38 54 38 90s-14 68-38 90"
    fill="none"
    stroke="#70a288"
    stroke-width="10"
    stroke-linecap="round"
  />
  <path
    d="M636 215l22-10-1 24"
    fill="none"
    stroke="#70a288"
    stroke-width="8"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
</svg>

version: 1
name: julia-pluto

steps:
  - uses: cocalc/apt
    with:
      packages:
        - ca-certificates
        - curl
        - tar

  - uses: cocalc/julia
    with:
      version: "1.12.6"
      install_prefix: /opt/julia
    timeout: 900

  - uses: cocalc/pluto
    with:
      depot: /opt/julia-depot
    timeout: 1800

  - uses: cocalc/code-server
    with:
      extensions:
        - julialang.language-julia
    timeout: 900

verify:
  - command -v julia
  - command -v code-server
  - julia -e 'import Pluto'
  - code-server --extensions-dir=/opt/code-server/extensions --list-extensions | grep -Fx julialang.language-julia

publish:
  label: Julia + Pluto
  slug: julia-pluto
  description: Julia with Pluto.jl installed system-wide, plus code-server with the Julia extension, a CoCalc Pluto app launcher, and examples.
  family: julia
  version: "1.12"
  channel: stable
  visibility: collaborators
  tags:
    - julia
    - pluto
    - code-server
    - vscode

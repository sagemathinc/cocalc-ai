version: 1
name: cocalc-base

steps:
  - uses: cocalc/apt
    with:
      upgrade: true
      packages:
        - bash
        - ca-certificates
        - curl
        - git
        - latexmk
        - less
        - libatomic1
        - openssh-client
        - openssh-sftp-server
        - procps
        - python3
        - python3-pip
        - python3-venv
        - sudo
        - texlive-fonts-recommended
        - texlive-latex-base
        - texlive-latex-recommended
        - wget
        - vim
        - tmux

  - name: Configure OpenSSH SFTP server compatibility path
    run: |
      set -euo pipefail
      if [ "$(id -u)" -eq 0 ]; then
        SUDO=""
      else
        SUDO="sudo -n"
      fi
      $SUDO mkdir -p /usr/libexec
      $SUDO ln -sf /usr/lib/openssh/sftp-server /usr/libexec/sftp-server

  - uses: cocalc/jupyter-python
    with:
      prefix: /opt/cocalc-jupyter
      install_bash_kernel: true

verify:
  - command -v latexmk
  - command -v jupyter-lab
  - command -v uv
  - test -e /usr/libexec/sftp-server
  - python3 -c 'import bash_kernel, ipykernel, jupyterlab, numpy, pandas, scipy, sklearn, sympy'
  - jupyter kernelspec list | grep -q python3
  - jupyter kernelspec list | grep -q bash

publish:
  label: CoCalc Minimal Base
  slug: cocalc-minimal-base
  description: Minimal useful CoCalc site base with shell tools, basic LaTeX, Python, JupyterLab, scientific Python packages, uv, SFTP support, and Python plus bash Jupyter kernels.
  family: cocalc-base
  version: "2026.06"
  channel: stable
  visibility: collaborators
  tags:
    - cocalc
    - base
    - python
    - jupyter
    - latex
    - bash-kernel

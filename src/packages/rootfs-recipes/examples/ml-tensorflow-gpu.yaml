version: 1
name: ml-tensorflow-gpu

builder:
  run_quota:
    disk_quota: 60000

steps:
  - uses: cocalc/apt
    with:
      upgrade: true
      packages:
        - bash
        - ca-certificates
        - curl
        - git
        - less
        - libatomic1
        - libgomp1
        - procps
        - python3
        - python3-pip
        - python3-venv
        - sudo
        - wget
        - vim
        - tmux

  - name: Install Python 3.12 with uv
    run: |
      set -euo pipefail
      if [ "$(id -u)" -eq 0 ]; then
        SUDO=""
      else
        SUDO="sudo -n"
      fi
      tmp="$(mktemp -d)"
      trap 'rm -rf "$tmp"' EXIT
      curl -LsSf https://astral.sh/uv/install.sh | env UV_INSTALL_DIR="$tmp/uv-bin" sh
      $SUDO install -m 755 "$tmp/uv-bin/uv" /usr/local/bin/uv
      $SUDO mkdir -p /opt/cocalc-python
      $SUDO chown -R "$(id -u):$(id -g)" /opt/cocalc-python
      uv python install 3.12 --install-dir /opt/cocalc-python
      python312="$(find /opt/cocalc-python -mindepth 3 -maxdepth 3 -path '*/bin/python3.12' | head -n 1)"
      test -x "$python312"
      $SUDO mkdir -p /opt/cocalc-python/bin
      $SUDO ln -sf "$python312" /opt/cocalc-python/bin/python3.12
      $SUDO chmod -R go+rX /opt/cocalc-python

  - uses: cocalc/jupyter-python
    with:
      prefix: /opt/cocalc-jupyter
      python: /opt/cocalc-python/bin/python3.12
      install_bash_kernel: true

  - uses: cocalc/tensorflow-gpu
    with:
      prefix: /opt/cocalc-jupyter
      package: "tensorflow[and-cuda]"
      create_cuda_symlinks: true
      require_gpu: false

verify:
  - command -v jupyter-lab
  - command -v uv
  - python3 -c 'import tensorflow as tf; print(tf.__version__, tf.config.list_physical_devices("GPU"))'
  - python3 -c 'import ipykernel, jupyterlab, numpy, pandas, tensorflow'
  - jupyter kernelspec list | grep -q python3

publish:
  label: TensorFlow GPU Machine Learning
  slug: tensorflow-gpu-ml
  description: CoCalc machine learning environment with JupyterLab, a Python kernel, scientific Python packages, uv, and TensorFlow with NVIDIA CUDA extras.
  family: machine-learning
  version: "2026.06"
  channel: stable
  visibility: collaborators
  tags:
    - machine-learning
    - python
    - jupyter
    - tensorflow
    - cuda
    - nvidia-gpu
    - uv
